<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo DAEWOO 2026</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- PANTALLA DE CARGA -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <h2>Cargando catálogo...</h2>
    </div>

    <!-- SECUENCIA DE INTRODUCCIÓN -->
    <div id="intro-sequence">
        <div class="intro-scene" id="scene-1">
            <h1>BIENVENIDOS</h1>
        </div>
        <div class="intro-scene" id="scene-2">
            <img src="daewoo-day.png" alt="Daewoo Day" class="intro-logo">
        </div>
        <div class="intro-scene" id="scene-3">
            <h2 class="intro-subtitle">CONOZCA NUESTROS PRODUCTOS</h2>
            <img src="daewoo-power.png" alt="Daewoo Power Products" class="intro-logo-small">
        </div>
    </div>

    <div class="app-container">
        <div class="flipbook-wrapper">
            <div id="flipbook" class="flipbook">
                <div class="page" data-density="hard"><div class="page-content"><img src="1.jpg" alt="" /></div></div>
                <div class="page"><div class="page-content"><img src="2.jpg" alt="" /></div></div>
                <div class="page"><div class="page-content"><img src="3.jpg" alt="" /></div></div>
                <div class="page"><div class="page-content"><img src="4.jpg" alt="" /></div></div>
                <div class="page"><div class="page-content"><img src="5.jpg" alt="" /></div></div>
                <div class="page"><div class="page-content"><img src="6.jpg" alt="" /></div></div>
                <div class="page"><div class="page-content"><img src="7.jpg" alt="" /></div></div>
                <div class="page"><div class="page-content"><img src="8.jpg" alt="" /></div></div>
                <div class="page"><div class="page-content"><img src="9.jpg" alt="" /></div></div>
                <div class="page"><div class="page-content"><img src="10.jpg" alt="" /></div></div>
                <div class="page"><div class="page-content"><img src="11.jpg" alt="" /></div></div>
                <div class="page" data-density="hard"><div class="page-content"><img src="12.jpg" alt="" /></div></div>
            </div>
        </div>
    </div>

    <!-- Carga la librería page-flip desde CDN -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    <script src="app.js"></script>
</body>
</html>
